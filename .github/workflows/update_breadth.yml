name: Daily Market Breadth Updater

on:
  workflow_dispatch: 
  schedule:
    # Runs at 11:30 AM UTC (5:00 PM IST) Monday through Friday
    - cron: '30 11 * * 1-5'

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyotp smartapi-python numpy logzero websocket-client

      - name: Run Market Breadth Script
        env:
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_CODE: ${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_PIN: ${{ secrets.ANGEL_PIN }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
        run: python market_breadth.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # This tells Git: "Add the file if it exists, but don't crash if it's missing"
          git add --ignore-unmatch market_breadth_history.csv
          
          # Only commit if there are actually staged changes
          git diff --quiet && git diff --staged --quiet || git commit -m "Update daily market breadth metrics"
          git push
